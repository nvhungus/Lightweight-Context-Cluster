experiment:
  name: hbcc_latency_small
data:
  name: cifar10
  root: data
  download: true
  batch_size: 128
  val_batch_size: 256
  test_batch_size: 256
  val_size: 5000
  split_seed: 42
  workers: 2
  augment: true
model:
  name: hbcc
  num_classes: 10
  use_coord: true
  embed_dims: [32, 64, 128, 192]
  depths: [1, 2, 2, 1]
  mlp_ratios: 3.0
  heads: [1, 2, 4, 4]
  head_dim: [16, 16, 16, 16]
  proposals: [[2, 2], [2, 2], [2, 2], [2, 2]]
  folds: [[4, 4], [2, 2], [1, 1], [1, 1]]
  similarities: [cosine, cosine, cosine, cosine]
  stage_modes: [local, hybrid, cluster, cluster]
  local_branches: [dwconv, dwconv, identity, identity]
  local_ratios: [1.0, 0.5, 0.0, 0.0]
  channel_shuffle: [false, false, false, false]
  norm: bn
  stem_stride: 2
  drop_path_rate: 0.04
train:
  epochs: 200
  lr: 0.001
  weight_decay: 0.05
  label_smoothing: 0.1
  amp: true
  kd_alpha: 0.0
  kd_temperature: 4.0
