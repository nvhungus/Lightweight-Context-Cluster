experiment:
  name: hbcc_accuracy_small
data:
  name: cifar10
  root: data
  download: true
  batch_size: 128
  val_batch_size: 256
  test_batch_size: 256
  val_size: 5000
  split_seed: 42
  workers: 2
  augment: true
  randaugment:
    enabled: true
    num_ops: 2
    magnitude: 9
  random_erasing:
    p: 0.25
    scale: [0.02, 0.2]
    ratio: [0.3, 3.3]
model:
  name: hbcc
  num_classes: 10
  use_coord: true
  embed_dims: [48, 80, 160, 224]
  depths: [2, 2, 3, 1]
  mlp_ratios: 3.0
  heads: [2, 2, 4, 4]
  head_dim: [16, 16, 16, 16]
  proposals: [[2, 2], [2, 2], [2, 2], [2, 2]]
  folds: [[4, 4], [2, 2], [1, 1], [1, 1]]
  similarities: [cosine, cosine, cosine, cosine]
  stage_modes: [hybrid, hybrid, cluster, cluster]
  local_branches: [lbpconv, dwconv, identity, identity]
  local_ratios: [0.5, 0.5, 0.0, 0.0]
  channel_shuffle: [true, true, false, false]
  norm: bn
  stem_stride: 2
  drop_path_rate: 0.08
train:
  epochs: 300
  warmup_epochs: 5
  lr: 0.001
  weight_decay: 0.05
  label_smoothing: 0.1
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  cutmix_prob: 0.5
  amp: true
  kd_alpha: 0.0
  kd_temperature: 4.0
