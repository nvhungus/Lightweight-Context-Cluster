experiment:
  name: resnet18_reference_stl10
data:
  name: stl10
  root: data
  download: true
  image_size: 96
  crop_pct: 1.0
  interpolation: bicubic
  batch_size: 64
  val_batch_size: 128
  test_batch_size: 128
  val_size: 500
  split_seed: 42
  workers: 2
  augment: true
  padding: 12
  randaugment:
    enabled: true
    num_ops: 2
    magnitude: 9
  random_erasing:
    p: 0.25
    scale: [0.02, 0.2]
    ratio: [0.3, 3.3]
model:
  name: resnet18_stl10
  num_classes: 10
train:
  epochs: 200
  warmup_epochs: 5
  lr: 0.001
  weight_decay: 0.05
  label_smoothing: 0.1
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  cutmix_prob: 0.5
  amp: true
