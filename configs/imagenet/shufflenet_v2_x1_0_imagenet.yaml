experiment:
  name: shufflenet_v2_x1_0_imagenet
data:
  name: imagenet1k
  root: data/imagenet
  train_split: train
  val_split: val
  test_split: val
  image_size: 224
  crop_pct: 0.875
  interpolation: bilinear
  batch_size: 128
  val_batch_size: 256
  test_batch_size: 256
  workers: 4
  augment: true
model:
  name: shufflenet_v2_x1_0_imagenet
  num_classes: 1000
train:
  epochs: 300
  warmup_epochs: 5
  lr: 0.001
  weight_decay: 0.05
  label_smoothing: 0.1
  mixup_alpha: 0.8
  cutmix_alpha: 1.0
  cutmix_prob: 1.0
  amp: true
