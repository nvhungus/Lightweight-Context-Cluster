experiment:
  name: official_coc_tiny_plain_imagenet
data:
  name: imagenet1k
  root: data/imagenet
  train_split: train
  val_split: val
  image_size: 224
  crop_pct: 0.95
  interpolation: bicubic
  batch_size: 128
  val_batch_size: 256
  workers: 4
  augment: true
  randaugment:
    enabled: true
    num_ops: 2
    magnitude: 9
  random_erasing:
    p: 0.25
model:
  name: official_coc_tiny_plain
  num_classes: 1000
  drop_path_rate: 0.1
train:
  skip_test: true
  epochs: 300
  warmup_epochs: 5
  lr: 0.001
  weight_decay: 0.05
  label_smoothing: 0.1
  mixup_alpha: 0.8
  cutmix_alpha: 1.0
  cutmix_prob: 1.0
  amp: true
