experiment:
  name: coc_cifar_baseline
data:
  name: cifar10
  root: data
  download: true
  batch_size: 128
  val_batch_size: 256
  test_batch_size: 256
  val_size: 5000
  split_seed: 42
  workers: 4
  augment: true
  randaugment:
    enabled: true
    num_ops: 2
    magnitude: 9
  random_erasing:
    p: 0.25
    scale: [0.02, 0.2]
    ratio: [0.3, 3.3]
model:
  name: hbcc
  num_classes: 10
  use_coord: true
  embed_dims: [32, 64, 196, 320]
  depths: [2, 2, 3, 1]
  mlp_ratios: [4.0, 4.0, 3.0, 3.0]
  heads: [2, 4, 4, 4]
  head_dim: [16, 16, 24, 24]
  proposals: [[2, 2], [2, 2], [2, 2], [2, 2]]
  folds: [[4, 4], [2, 2], [1, 1], [1, 1]]
  similarities: [cosine, cosine, cosine, cosine]
  stage_modes: [cluster, cluster, cluster, cluster]
  local_branches: [identity, identity, identity, identity]
  local_ratios: [0.0, 0.0, 0.0, 0.0]
  channel_shuffle: [false, false, false, false]
  norm: gn
  stem_stride: 2
  drop_path_rate: 0.05
train:
  epochs: 300
  warmup_epochs: 5
  lr: 0.001
  weight_decay: 0.05
  label_smoothing: 0.1
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  cutmix_prob: 0.5
  amp: true
