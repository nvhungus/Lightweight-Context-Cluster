experiment:
  name: hbcc_current_reference
data:
  name: cifar10
  root: data
  download: true
  batch_size: 128
  val_batch_size: 256
  workers: 2
  augment: true
model:
  name: hbcc
  num_classes: 10
  use_coord: false
  embed_dims: [32, 64, 128, 192]
  depths: [1, 1, 2, 1]
  mlp_ratios: 3.0
  heads: [2, 2, 4, 4]
  head_dim: [16, 16, 16, 16]
  proposals: [[2, 2], [2, 2], [2, 2], [2, 2]]
  folds: [[1, 1], [2, 2], [1, 1], [1, 1]]
  similarities: [cosine, cosine, cosine, cosine]
  stage_modes: [cluster, hybrid, cluster, cluster]
  local_branches: [identity, dwconv, identity, identity]
  local_ratios: [0.0, 0.5, 0.0, 0.0]
  channel_shuffle: [false, false, false, false]
  norm: bn
  stem_stride: 1
  drop_path_rate: 0.02
train:
  epochs: 200
  lr: 0.001
  weight_decay: 0.05
  label_smoothing: 0.1
  amp: true
