experiment:
  name: smoke_hbcc_latency_tiny_fake
data:
  name: fake
  batch_size: 8
  val_batch_size: 8
  workers: 0
  augment: false
  fake_train_size: 32
  fake_val_size: 16
model:
  name: hbcc
  num_classes: 10
  use_coord: true
  embed_dims: [16, 24, 32, 48]
  depths: [1, 1, 1, 1]
  mlp_ratios: 1.5
  heads: [1, 1, 2, 2]
  head_dim: [8, 8, 8, 8]
  proposals: [[2, 2], [2, 2], [2, 2], [1, 1]]
  folds: [[4, 4], [2, 2], [1, 1], [1, 1]]
  similarities: [cosine, cosine, cosine, cosine]
  stage_modes: [local, hybrid, cluster, cluster]
  local_branches: [dwconv, dwconv, identity, identity]
  local_ratios: [1.0, 0.5, 0.0, 0.0]
  channel_shuffle: [false, true, false, false]
  norm: bn
  stem_stride: 2
train:
  epochs: 1
  lr: 0.001
  weight_decay: 0.01
  label_smoothing: 0.0
  amp: true
