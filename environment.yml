name: CoC
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      - --index-url https://download.pytorch.org/whl/cu121
      - torch
      - torchvision
      - --extra-index-url https://pypi.org/simple
      - einops
      - fvcore
      - matplotlib
      - pandas
      - pypdf
      - pyyaml
      - rich
      - tabulate
      - tensorboard
      - thop
      - timm==0.6.13
      - tqdm
